<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural_Core | System Scheduler</title>
    <style>
        :root { 
            --neon: #00ff41; 
            --bg: #020202; 
            --glass: rgba(255, 255, 255, 0.03);
            --error: #ff3131;
        }
        
        /* HIDE DEFAULT CURSOR */
        * { cursor: none !important; margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* NEON WHITE STYLISH CURSOR */
        #custom-cursor {
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10001;
            transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff;
        }

        /* DYNAMIC LOAD BACKGROUND */
        #neural-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 255, 65, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .dashboard {
            width: 800px; display: flex; gap: 20px;
        }

        .todo-main {
            flex: 2; background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 35px;
        }

        /* LIVE TERMINAL SIDEBAR */
        .terminal-sidebar {
            flex: 1; background: rgba(0, 0, 0, 0.5); border-radius: 25px;
            padding: 20px; font-size: 0.7rem; border: 1px solid #111;
            color: var(--neon); overflow-y: hidden; max-height: 450px;
        }

        .header h1 { font-size: 1.4rem; letter-spacing: 5px; color: var(--neon); }
        
        .input-area { display: flex; gap: 10px; margin: 25px 0; }
        input {
            flex: 1; background: transparent; border: 1px solid #222;
            color: white; padding: 12px; border-radius: 8px; outline: none;
        }
        input:focus { border-color: var(--neon); }

        .btn {
            background: var(--neon); color: black; border: none; padding: 0 20px;
            border-radius: 8px; font-weight: bold; transition: 0.3s;
        }

        /* TASK ITEMS */
        .task-list { list-style: none; max-height: 250px; overflow-y: auto; }
        .task-item {
            background: rgba(255,255,255,0.02); margin-bottom: 8px;
            padding: 12px; border-radius: 8px; display: flex; justify-content: space-between;
            animation: bootUp 0.3s ease-out;
        }
        @keyframes bootUp { from { opacity: 0; transform: scale(0.95); } }

        .completed { opacity: 0.3; text-decoration: line-through; border-left: 3px solid var(--neon); }

        /* BUTTONS */
        .done-btn { color: var(--neon); background: none; border: none; margin-right: 10px; }
        .del-btn { color: var(--error); background: none; border: none; }

        /* PROGRESS RING */
        .progress-container { text-align: center; margin-top: 20px; color: #555; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="neural-bg"></div>
    <div id="custom-cursor"></div>

    <div class="dashboard">
        <div class="todo-main">
            <div class="header">
                <h1>NEURAL_TASK_CORE</h1>
                <p style="color: #444; font-size: 0.7rem;">[ UPTIME: <span id="uptime">0</span>s ] [ MEMORY: OPTIMAL ]</p>
            </div>

            <div class="input-area">
                <input type="text" id="taskIn" placeholder="Enter task command...">
                <button class="btn" onclick="addTask()">EXECUTE</button>
            </div>

            <ul class="task-list" id="taskContainer"></ul>

            <div class="progress-container">
                <p>SYSTEM_LOAD: <span id="load">0</span>%</p>
                <div style="width: 100%; height: 2px; background: #111; margin-top: 5px;">
                    <div id="progress-bar" style="width: 0%; height: 100%; background: var(--neon); transition: 0.5s;"></div>
                </div>
            </div>
        </div>

        <div class="terminal-sidebar">
            <p style="margin-bottom: 10px; border-bottom: 1px solid #111;">> SYSTEM_LOG</p>
            <div id="log-content"></div>
        </div>
    </div>

    <script>
        // CURSOR & BG LOGIC
        const dot = document.getElementById('custom-cursor');
        const bg = document.getElementById('neural-bg');

        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            bg.style.setProperty('--x', e.clientX + 'px');
            bg.style.setProperty('--y', e.clientY + 'px');
        });

        const taskIn = document.getElementById('taskIn');
        const container = document.getElementById('taskContainer');
        const logContent = document.getElementById('log-content');
        const progressBar = document.getElementById('progress-bar');
        const loadText = document.getElementById('load');

        function addLog(msg) {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            logContent.innerHTML = `<div style="margin-bottom: 5px;">[${time}] ${msg}</div>` + logContent.innerHTML;
        }

        function addTask() {
            const val = taskIn.value.trim();
            if(!val) return;

            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <span>> ${val}</span>
                <div>
                    <button class="done-btn" onclick="complete(this)">[OK]</button>
                    <button class="del-btn" onclick="remove(this)">[CLR]</button>
                </div>
            `;
            container.appendChild(li);
            addLog(`NEW_THREAD_STARTED: ${val}`);
            taskIn.value = '';
            updateSystem();
        }

        function complete(btn) {
            const item = btn.closest('.task-item');
            item.classList.toggle('completed');
            addLog(`THREAD_STATUS_CHANGED: STACK_UPDATE`);
            updateSystem();
        }

        function remove(btn) {
            btn.closest('.task-item').remove();
            addLog(`PROCESS_TERMINATED: EXIT_CODE_0`);
            updateSystem();
        }

        function updateSystem() {
            const total = container.children.length;
            const done = document.querySelectorAll('.completed').length;
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            
            progressBar.style.width = percent + '%';
            loadText.innerText = percent;
        }

        // Uptime counter to mimic your Arduino/System timers
        let seconds = 0;
        setInterval(() => {
            seconds++;
            document.getElementById('uptime').innerText = seconds;
        }, 1000);

        // Hover Effect
        document.addEventListener('mouseover', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') {
                dot.style.transform = 'translate(-50%, -50%) scale(2.5)';
            } else {
                dot.style.transform = 'translate(-50%, -50%) scale(1)';
            }
        });
    </script>
</body>
</html>
