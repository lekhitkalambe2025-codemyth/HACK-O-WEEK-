<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus_Quiz | Logic Validator</title>
    <style>
        :root { --neon: #00ff41; --error: #ff3131; --bg: #050505; --accent: #ffae00; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; }
        
        .quiz-container {
            max-width: 800px;
            margin: 50px auto;
            background: rgba(15, 20, 30, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--neon);
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.1);
            position: relative;
        }

        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.8rem; color: var(--accent); }
        
        .q-text { font-size: 1.5rem; margin-bottom: 30px; line-height: 1.4; border-left: 4px solid var(--neon); padding-left: 15px; }

        .option-btn {
            display: block; width: 100%; padding: 18px; margin: 12px 0;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,65,0.3);
            color: white; cursor: pointer; transition: 0.2s; border-radius: 10px; font-size: 1rem;
        }

        .option-btn:hover { background: rgba(0, 255, 65, 0.1); border-color: var(--neon); }
        
        /* Shake Animation for Wrong Answers */
        .shake { animation: shake 0.4s; border-color: var(--error) !important; color: var(--error); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .correct-flash { background: var(--neon) !important; color: black !important; }

        .hint-box { margin-top: 20px; padding: 15px; background: rgba(255, 174, 0, 0.1); border: 1px dashed var(--accent); display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="status-bar">
        <span>ENCRYPTION_LEVEL: HIGH</span>
        <span id="timer">UPTIME: 00s</span>
        <span id="attempts">RETRIES: 0</span>
    </div>

    <div id="quiz-ui">
        <div id="question" class="q-text">Loading Neural Interface...</div>
        <div id="options"></div>
        <div id="hint-area" class="hint-box"></div>
    </div>

    <div id="score-screen" style="display:none; text-align:center;">
        <h1 style="color:var(--neon)">SYSTEM_UNLOCKED</h1>
        <p id="stats"></p>
        <button onclick="location.reload()" style="background:var(--neon); border:none; padding:15px 30px; cursor:pointer; font-weight:bold;">RE-RUN EXPLOIT</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "Logic Gate: Which gate returns 0 ONLY if both inputs are 1?", opts: ["NAND", "NOR", "AND", "XOR"], correct: 0, hint: "Think: Inverse of the AND gate." },
        { q: "C Language: What is the output of 'printf(\"%d\", 5 > 2 > 1);'?", opts: ["1", "0", "Error", "True"], correct: 1, hint: "Left-to-right: (5 > 2) is 1. Now, is 1 > 1?" },
        { q: "DELD: In 2's Complement, the most significant bit (MSB) represents what?", opts: ["Magnitude", "Sign", "Parity", "Carry"], correct: 1, hint: "It defines if the number is positive or negative." },
        { q: "Nano-Tech: Which carbon structure is a single layer of atoms in a hexagonal lattice?", opts: ["Diamond", "Nanotube", "Graphene", "Fullerene"], correct: 2, hint: "It is a 2D material often called a 'super material'." },
        { q: "Python: What is the result of '3 * 1 ** 3'?", opts: ["27", "9", "3", "1"], correct: 2, hint: "Remember PEMDAS/BODMAS: Exponents come before multiplication." }
    ];

    let currentIdx = 0;
    let retries = 0;
    let startTime = Date.now();

    function loadQuestion() {
        const current = quizData[currentIdx];
        document.getElementById("question").innerText = `> ${current.q}`;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        document.getElementById("hint-area").style.display = "none";
        
        current.opts.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = (e) => validate(i, e.target);
            optionsDiv.appendChild(btn);
        });
    }

    function validate(idx, btn) {
        if (idx === quizData[currentIdx].correct) {
            btn.classList.add("correct-flash");
            setTimeout(() => {
                currentIdx++;
                if (currentIdx < quizData.length) loadQuestion();
                else endQuiz();
            }, 500);
        } else {
            retries++;
            document.getElementById("attempts").innerText = `RETRIES: ${retries}`;
            btn.classList.add("shake");
            document.getElementById("hint-area").innerText = `AI_ADVICE: ${quizData[currentIdx].hint}`;
            document.getElementById("hint-area").style.display = "block";
            setTimeout(() => btn.classList.remove("shake"), 400);
        }
    }

    function endQuiz() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("score-screen").style.display = "block";
        const timeTaken = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById("stats").innerText = `Time: ${timeTaken}s | Total Retries: ${retries}`;
    }

    setInterval(() => {
        const s = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById("timer").innerText = `UPTIME: ${s}s`;
    }, 1000);

    loadQuestion();
</script>
</body>
</html>
