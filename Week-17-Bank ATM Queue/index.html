<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrifuge_ATM | Cyclic Logic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;800&family=JetBrains+Mono&display=swap');

        :root { 
            --cyan: #00f2ff; 
            --navy: #0a192f;
            --void: #020617;
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        * { cursor: none !important; margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--void);
            color: #fff; 
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* RADAR CURSOR */
        #custom-cursor {
            width: 12px; height: 12px; background: var(--cyan); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10001;
            transform: translate(-50%, -50%); box-shadow: 0 0 20px var(--cyan);
            transition: transform 0.1s ease;
        }

        /* SYSTEM HUD (LEFT) */
        .hud-panel {
            width: 450px;
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(30px);
            border-right: 1px solid rgba(0, 242, 255, 0.1);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .hud-panel h1 { font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; color: var(--cyan); margin-bottom: 5px; }
        .hud-panel p { font-family: 'JetBrains Mono'; font-size: 0.65rem; color: #4b5563; margin-bottom: 50px; }

        .control-block label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #64748b; display: block; margin-bottom: 12px; }
        
        input {
            width: 100%; padding: 20px; border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 15px;
            background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem; outline: none; margin-bottom: 30px;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            padding: 18px; border-radius: 12px; font-weight: 800; font-size: 0.75rem; 
            text-transform: uppercase; transition: 0.3s; border: none;
        }
        .btn-enq { background: var(--cyan); color: var(--navy); }
        .btn-deq { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .btn:hover:not(:disabled) { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); background: #fff; color: #000; }
        .btn:disabled { opacity: 0.1; }

        /* CIRCULAR VISUALIZER (RIGHT) */
        .ring-chamber {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a192f 0%, #020617 100%);
        }

        .circular-track {
            width: 500px; height: 500px;
            border: 2px dashed rgba(0, 242, 255, 0.05);
            border-radius: 50%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        .slot {
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slot.active { background: rgba(0, 242, 255, 0.1); border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .slot b { font-size: 0.7rem; color: var(--cyan); display: block; }
        .slot span { font-size: 0.6rem; color: #fff; opacity: 0.6; }

        /* CENTER CORE */
        .core {
            text-align: center; z-index: 5;
        }
        .core h2 { font-size: 3rem; font-weight: 800; color: #fff; }
        .core span { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: #4b5563; }

        /* POINTERS */
        .pointer { position: absolute; font-family: 'JetBrains Mono'; font-size: 0.6rem; font-weight: 800; padding: 4px 10px; border-radius: 4px; z-index: 20; }
        .front-ptr { background: var(--cyan); color: var(--navy); }
        .rear-ptr { background: #ff0055; color: #fff; }

    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <aside class="hud-panel">
        <h1>CENTRIFUGE_ATM</h1>
        <p>// CYCLIC_BUFFER_V1.0 //</p>

        <div class="control-block">
            <label>Customer Identity</label>
            <input type="text" id="cusIn" placeholder="ID_ALPHA_7">
            
            <div class="action-btns">
                <button class="btn btn-enq" onclick="enqueue()">ENQUEUE</button>
                <button class="btn btn-deq" id="deqBtn" onclick="dequeue()" disabled>DEQUEUE</button>
            </div>
        </div>

        <div style="margin-top: auto; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.05);">
            <p style="font-family:'JetBrains Mono'; font-size:0.65rem; color:#4b5563; line-height:1.6;">
                > <b>LOGIC_TRACE:</b> Circular implementation allows $O(1)$ recycling of indices. 
                Full state reached when $(rear + 1) \pmod{size} == front$.
            </p>
        </div>
    </aside>

    <main class="ring-chamber">
        <div class="core">
            <h2 id="totalCount">0</h2>
            <span>QUEUE_LOAD</span>
        </div>

        <div class="circular-track" id="ring">
            </div>
    </main>

    <script>
        const dot = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        // CIRCULAR QUEUE ARCHITECTURE
        const SIZE = 8;
        let queue = new Array(SIZE).fill(null);
        let front = -1;
        let rear = -1;

        function initRing() {
            const ring = document.getElementById('ring');
            ring.innerHTML = "";
            const radius = 250;

            for (let i = 0; i < SIZE; i++) {
                const angle = (i * (360 / SIZE)) * (Math.PI / 180);
                const x = radius * Math.cos(angle);
                const y = radius * Math.sin(angle);

                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = `slot-${i}`;
                slot.style.transform = `translate(${x}px, ${y}px)`;
                slot.innerHTML = `<b>${i}</b><span>EMPTY</span>`;
                ring.appendChild(slot);
            }
        }

        function enqueue() {
            const val = document.getElementById('cusIn').value.trim();
            if (!val) return;

            // Check Full
            if ((rear + 1) % SIZE === front) {
                alert("BUFFER_OVERFLOW: Queue is at peak capacity.");
                return;
            }

            if (front === -1) front = 0;
            rear = (rear + 1) % SIZE;
            queue[rear] = val;
            
            document.getElementById('cusIn').value = "";
            render();
        }

        function dequeue() {
            if (front === -1) return;

            queue[front] = null;
            if (front === rear) {
                front = -1;
                rear = -1;
            } else {
                front = (front + 1) % SIZE;
            }
            render();
        }

        function render() {
            let activeCount = 0;
            for (let i = 0; i < SIZE; i++) {
                const slot = document.getElementById(`slot-${i}`);
                const data = queue[i];
                
                // Clear pointers
                const existingPtrs = slot.querySelectorAll('.pointer');
                existingPtrs.forEach(p => p.remove());

                if (data) {
                    slot.classList.add('active');
                    slot.querySelector('span').innerText = data;
                    activeCount++;
                } else {
                    slot.classList.remove('active');
                    slot.querySelector('span').innerText = "EMPTY";
                }

                // Add Pointers
                if (i === front && front !== -1) {
                    const p = document.createElement('div');
                    p.className = 'pointer front-ptr';
                    p.innerText = 'FRONT';
                    slot.appendChild(p);
                }
                if (i === rear && rear !== -1) {
                    const p = document.createElement('div');
                    p.className = 'pointer rear-ptr';
                    p.innerText = 'REAR';
                    slot.appendChild(p);
                }
            }

            document.getElementById('totalCount').innerText = activeCount;
            document.getElementById('deqBtn').disabled = (front === -1);
        }

        initRing();
        render();

        // Cursor scaling
        document.addEventListener('mouseover', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') {
                dot.style.transform = 'translate(-50%, -50%) scale(4)';
                dot.style.background = 'transparent';
                dot.style.border = '1px solid var(--cyan)';
            } else {
                dot.style.transform = 'translate(-50%, -50%) scale(1)';
                dot.style.background = 'var(--cyan)';
                dot.style.border = 'none';
            }
        });
    </script>
</body>
</html>
